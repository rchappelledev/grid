<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Grid with URL Parameters</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .grid-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }
        .grid-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .grid-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #ddd;
            vertical-align: top;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .grid-table tr:last-child td {
            border-bottom: none;
        }
        .grid-table th {
            padding: 8px 12px;
            border-bottom: 1px solid #ddd;
            background: #f5f5f5;
            font-weight: 600;
            text-align: left;
        }
        .grid-table th:first-child {
            border-right: 1px solid #ddd;
        }
        .grid-table td:first-child {
            border-right: 1px solid #ddd;
            font-weight: 500;
        }
        .grid-table tr {
            height: 1px;
        }
        .grid-table td {
            height: 1px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <table class="grid-table" id="grid">
            <thead>
                <tr>
                    <th>Column1</th>
                    <th>Column2</th>
                </tr>
            </thead>
            <tbody id="gridBody">
            </tbody>
        </table>
    </div>
    <script>
        const gridBody = document.getElementById("gridBody");

        function parseRowsFromHash() {
            const params = new URLSearchParams(location.hash.slice(1));
            const rows = [];
            const addRowValues = params.getAll("addRow");
            for (const pair of addRowValues) {
                const idx = pair.indexOf(",");
                const col1 = idx >= 0 ? decodeURIComponent(pair.slice(0, idx).trim()) : decodeURIComponent(pair.trim());
                const col2 = idx >= 0 ? decodeURIComponent(pair.slice(idx + 1).trim()) : "";
                rows.push([col1, col2]);
            }
            return rows;
        }

        function buildHashFromRows(rows) {
            if (rows.length === 0) return "";
            const pairs = rows.map(([a, b]) => "addRow=" + encodeURIComponent(a) + "," + encodeURIComponent(b));
            return "#" + pairs.join("&");
        }

        function renderGrid(rows) {
            gridBody.innerHTML = "";
            for (const [col1, col2] of rows) {
                const tr = document.createElement("tr");
                const td1 = document.createElement("td");
                const td2 = document.createElement("td");
                td1.textContent = col1;
                td2.textContent = col2;
                tr.appendChild(td1);
                tr.appendChild(td2);
                gridBody.appendChild(tr);
            }
        }

        function syncHashToGrid() {
            const rows = parseRowsFromHash();
            renderGrid(rows);
            if (typeof ReturnStringToMobileFrame === "function") {
                ReturnStringToMobileFrame(window.location.href);
            }
        }

        function initGridFromHash() {
            const rows = parseRowsFromHash();
            renderGrid(rows);
            const newHash = buildHashFromRows(rows);
            if (location.hash !== newHash && rows.length > 0) {
                location.hash = newHash;
            }
            if (typeof ReturnStringToMobileFrame === "function") {
                ReturnStringToMobileFrame(window.location.href);
            }
        }

        window.addEventListener("hashchange", syncHashToGrid);
        initGridFromHash();
    </script>
</body>
</html>
